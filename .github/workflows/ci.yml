name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff pytest 2>/dev/null || true
          [ -f requirements.txt ] && pip install -r requirements.txt || true

      - name: Lint Python files
        run: |
          PY_FILES=$(find . -name "*.py" -not -path "./.git/*" \
            | grep -v -E "./(scrape_yale_labs|tag_labs|build_labs|gen_labs)\.py$")
          if [ -n "$PY_FILES" ]; then
            echo "$PY_FILES" | xargs ruff check
          else
            echo "No Python files to lint."
          fi

      - name: Run tests (if any)
        run: |
          if [ -d tests ] && [ -n "$(ls tests/*.py 2>/dev/null)" ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests found - skipping."
          fi

      - name: Validate labs_tagged.json schema
        run: python validate_schema.py

      - name: Check index.html is well-formed
        run: python check_html.py
